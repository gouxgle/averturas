<!-- @dsCard group="Colors" -->
<!DOCTYPE html><html lang="es"><head><meta charset="utf-8"><title>Section Accents</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--app-bg);font-family:var(--font-sans);}
  .wrap{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;padding:20px;}
  .sw{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .chip{width:100%;aspect-ratio:1;border-radius:var(--radius-lg);box-shadow:var(--shadow-card);}
  .name{font-size:10px;font-weight:600;color:var(--fg3);text-align:center;line-height:1.2;}
  .hex{font-size:9px;color:var(--fg5);font-family:var(--font-mono);}
</style></head>
<body>
  <div class="wrap">
    <div class="sw"><div class="chip" style="background:#60a5fa"></div><div class="name">Dashboard</div><div class="hex">#60A5FA</div></div>
    <div class="sw"><div class="chip" style="background:#fb7185"></div><div class="name">CRM</div><div class="hex">#FB7185</div></div>
    <div class="sw"><div class="chip" style="background:#a78bfa"></div><div class="name">Presupuestos</div><div class="hex">#A78BFA</div></div>
    <div class="sw"><div class="chip" style="background:#fbbf24"></div><div class="name">Operaciones</div><div class="hex">#FBBF24</div></div>
    <div class="sw"><div class="chip" style="background:#2dd4bf"></div><div class="name">Remitos</div><div class="hex">#2DD4BF</div></div>
    <div class="sw"><div class="chip" style="background:#a3e635"></div><div class="name">Pedidos</div><div class="hex">#A3E635</div></div>
    <div class="sw"><div class="chip" style="background:#34d399"></div><div class="name">Recibos</div><div class="hex">#34D399</div></div>
    <div class="sw"><div class="chip" style="background:#22d3ee"></div><div class="name">Clientes</div><div class="hex">#22D3EE</div></div>
    <div class="sw"><div class="chip" style="background:#818cf8"></div><div class="name">Estado&nbsp;Cta</div><div class="hex">#818CF8</div></div>
    <div class="sw"><div class="chip" style="background:#38bdf8"></div><div class="name">Productos</div><div class="hex">#38BDF8</div></div>
    <div class="sw"><div class="chip" style="background:#fb923c"></div><div class="name">Stock</div><div class="hex">#FB923C</div></div>
    <div class="sw"><div class="chip" style="background:#fbbf24"></div><div class="name">Proveedores</div><div class="hex">#FBBF24</div></div>
    <div class="sw"><div class="chip" style="background:#c084fc"></div><div class="name">Reportes</div><div class="hex">#C084FC</div></div>
    <div class="sw"><div class="chip" style="background:#cbd5e1"></div><div class="name">Config</div><div class="hex">#CBD5E1</div></div>
  </div>
</body></html>
