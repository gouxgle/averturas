<!-- @dsCard group="Type" -->
<!DOCTYPE html><html lang="es"><head><meta charset="utf-8"><title>Type Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--font-sans);color:var(--fg2);}
  .wrap{padding:24px 28px;display:flex;flex-direction:column;gap:14px;}
  .row{display:grid;grid-template-columns:80px 1fr 110px;align-items:baseline;gap:18px;}
  .meta{font-family:var(--font-mono);font-size:10px;color:var(--fg5);font-weight:600;text-transform:uppercase;letter-spacing:0.08em;}
  .right{font-family:var(--font-mono);font-size:10px;color:var(--fg5);text-align:right;font-weight:600;}
</style></head>
<body>
  <div class="wrap">
    <div class="row"><div class="meta">Display</div><div style="font-size:32px;font-weight:800;letter-spacing:-0.01em;color:#111827">$ 1.250.000</div><div class="right">32 · 800</div></div>
    <div class="row"><div class="meta">H1</div><div style="font-size:24px;font-weight:800;letter-spacing:-0.01em;color:#111827">Tablero de Operaciones</div><div class="right">24 · 800</div></div>
    <div class="row"><div class="meta">KPI</div><div style="font-size:20px;font-weight:800;color:#111827;font-variant-numeric:tabular-nums">847</div><div class="right">20 · 800</div></div>
    <div class="row"><div class="meta">Card</div><div style="font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;color:#1f2937">PRIORIDADES DE HOY</div><div class="right">14 · 700 ↑</div></div>
    <div class="row"><div class="meta">Body</div><div style="font-size:13px;font-weight:400;color:#4b5563">Ingresá tus credenciales para continuar</div><div class="right">13 · 400</div></div>
    <div class="row"><div class="meta">Small</div><div style="font-size:12px;font-weight:500;color:#4b5563">Coordiná la entrega hoy</div><div class="right">12 · 500</div></div>
    <div class="row"><div class="meta">Meta</div><div style="font-size:11px;font-weight:600;color:#6b7280">Hace 3 días</div><div class="right">11 · 600</div></div>
    <div class="row"><div class="meta">Micro</div><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:#6b7280">COMERCIAL</div><div class="right">10 · 700 ↑</div></div>
  </div>
</body></html>
