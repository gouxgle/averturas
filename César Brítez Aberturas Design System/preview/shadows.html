<!DOCTYPE html><html lang="es"><head><meta charset="utf-8"><title>Shadows</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--app-bg);font-family:var(--font-sans);}
  .wrap{padding:36px 24px;display:grid;grid-template-columns:repeat(4,1fr);gap:20px;}
  .tile{display:flex;flex-direction:column;align-items:center;gap:12px;}
  .box{width:120px;height:80px;background:#fff;border:1px solid #f3f4f6;border-radius:16px;}
  .name{font-size:11px;font-weight:600;color:#1f2937;}
  .use{font-size:10px;color:#6b7280;text-align:center;}
</style></head>
<body>
  <div class="wrap">
    <div class="tile"><div class="box" style="box-shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04)"></div><div class="name">card</div><div class="use">default for every<br>card / KPI tile</div></div>
    <div class="tile"><div class="box" style="box-shadow:0 2px 15px -3px rgba(0,0,0,.07),0 10px 20px -2px rgba(0,0,0,.04)"></div><div class="name">soft</div><div class="use">modals, popovers</div></div>
    <div class="tile"><div class="box" style="box-shadow:0 10px 32px -6px rgba(3,29,73,0.13),0 4px 12px -2px rgba(3,29,73,0.07)"></div><div class="name">lift (hover)</div><div class="use">card:hover<br>navy-tinted</div></div>
    <div class="tile"><div class="box" style="box-shadow:0 8px 32px -8px rgba(0,0,0,0.18)"></div><div class="name">pop</div><div class="use">dropdowns,<br>notif panel</div></div>
  </div>
</body></html>
