<!DOCTYPE html><html lang="es"><head><meta charset="utf-8"><title>Casing &amp; Tracking</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--app-bg);font-family:var(--font-sans);}
  .wrap{padding:22px;display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .card{background:#fff;border:1px solid #f3f4f6;border-radius:16px;padding:16px;box-shadow:var(--shadow-card);}
  .label{font-size:10px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;}
  .h-section{font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;color:#1f2937;}
  .h-page{font-size:24px;font-weight:800;letter-spacing:-0.01em;color:#111827;}
  .micro{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:#6b7280;}
  .field-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:#6b7280;}
  .btn{display:inline-block;background:#031d49;color:#fff;padding:8px 14px;border-radius:12px;font-size:13px;font-weight:600;}
</style></head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="label">Page title — sentence case</div>
      <div class="h-page">Tablero de Operaciones</div>
    </div>
    <div class="card">
      <div class="label">Card header — UPPER + wide</div>
      <div class="h-section">PRIORIDADES DE HOY</div>
    </div>
    <div class="card">
      <div class="label">Section group — UPPER + widest</div>
      <div class="micro">COMERCIAL</div>
    </div>
    <div class="card">
      <div class="label">Form label — UPPER + wider</div>
      <div class="field-label">EMAIL</div>
    </div>
    <div class="card">
      <div class="label">Button — sentence, verb-first</div>
      <div class="btn">Nuevo presupuesto</div>
    </div>
    <div class="card">
      <div class="label">Brand wordmark — ALL CAPS</div>
      <div style="font-size:16px;font-weight:800;letter-spacing:0.04em;color:#031d49;">CÉSAR BRÍTEZ</div>
    </div>
  </div>
</body></html>
