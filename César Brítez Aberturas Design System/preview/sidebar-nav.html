<!-- @dsCard group="Components" -->
<!DOCTYPE html><html lang="es"><head><meta charset="utf-8"><title>Sidebar Nav</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--app-bg);font-family:var(--font-sans);}
  .wrap{padding:0;display:flex;align-items:stretch;}
  .rail{background:#031d49;width:56px;display:flex;flex-direction:column;align-items:center;padding:10px 0 12px;gap:6px;min-height:360px;}
  .logo{width:30px;height:30px;display:grid;grid-template-columns:1fr 1fr;gap:2px;margin-bottom:8px;}
  .logo i{display:block;border-radius:5px;}
  .div{width:80%;height:1px;background:rgba(255,255,255,0.10);margin:4px 0;}
  .lab{font-size:9px;color:rgba(255,255,255,0.30);text-transform:uppercase;letter-spacing:0.12em;font-weight:700;align-self:flex-start;margin-left:8px;}
  .item{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.45);}
  .item svg{width:18px;height:18px;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;}
  .item.active{background:rgba(255,255,255,0.10);color:#60a5fa;position:relative;}
  .item.active::before{content:"";position:absolute;left:-12px;top:50%;transform:translateY(-50%);width:2px;height:18px;background:#60a5fa;border-radius:0 4px 4px 0;}
  .item.hover{background:rgba(251,113,133,0.10);color:#fb7185;transform:scale(1.1);}
  .pane{flex:1;padding:18px 22px;display:flex;flex-direction:column;gap:10px;background:var(--app-bg);}
  .row{display:flex;align-items:center;gap:8px;font-size:12px;color:#1f2937;background:#fff;padding:10px 14px;border-radius:12px;border:1px solid #f3f4f6;box-shadow:var(--shadow-card);}
  .row .swatch{width:10px;height:10px;border-radius:50%;}
  .row .meta{font-family:var(--font-mono);font-size:10px;color:#9ca3af;margin-left:auto;}
</style></head>
<body>
  <div class="wrap">
    <div class="rail">
      <div class="logo"><i style="background:rgba(255,255,255,0.90)"></i><i style="background:#e31e24"></i><i style="background:rgba(255,255,255,0.45)"></i><i style="background:rgba(255,255,255,0.20)"></i></div>
      <div class="item active" title="Dashboard"><svg viewBox="0 0 24 24" stroke="currentColor"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg></div>
      <div class="div"></div>
      <div class="item hover" title="CRM"><svg viewBox="0 0 24 24" stroke="currentColor"><circle cx="6" cy="6" r="3"/><circle cx="18" cy="18" r="3"/><path d="M6 9v6a6 6 0 0 0 6 6"/></svg></div>
      <div class="item" title="Presupuestos"><svg viewBox="0 0 24 24" stroke="currentColor"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg></div>
      <div class="item" title="Operaciones"><svg viewBox="0 0 24 24" stroke="currentColor"><path d="m15 12-8.5 8.5a2.12 2.12 0 0 1-3-3L12 9"/></svg></div>
      <div class="item" title="Remitos"><svg viewBox="0 0 24 24" stroke="currentColor"><rect x="1" y="3" width="15" height="13" rx="1"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/></svg></div>
      <div class="item" title="Recibos"><svg viewBox="0 0 24 24" stroke="currentColor"><path d="M2 17h2.5a2 2 0 0 0 1.4-.6L7 16h10l1.1 1.4a2 2 0 0 0 1.4.6H22"/></svg></div>
    </div>
    <div class="pane">
      <div class="row"><span class="swatch" style="background:#60a5fa"></span><strong>Active</strong>&nbsp;— left bar + tinted bg in section's accent <span class="meta">blue-400 / bg-white/10</span></div>
      <div class="row"><span class="swatch" style="background:#fb7185"></span><strong>Hover</strong>&nbsp;— icon scales 1.1, tile lights up in accent <span class="meta">rose-400 / bg-rose-500/10</span></div>
      <div class="row"><span class="swatch" style="background:rgba(255,255,255,0.45);border:1px solid #d1d5db"></span><strong>Idle</strong>&nbsp;— icon at white/45, no background <span class="meta">white/45</span></div>
      <div class="row"><strong>Width</strong> 56px desktop · 256px mobile drawer · labels via tooltip on desktop <span class="meta">w-14 / w-64</span></div>
    </div>
  </div>
</body></html>
