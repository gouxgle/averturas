<!-- @dsCard group="Brand" -->
<!DOCTYPE html><html lang="es"><head><meta charset="utf-8"><title>Brand Imagery</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--app-bg);font-family:var(--font-sans);}
  .wrap{padding:18px;display:grid;grid-template-columns:1.6fr 1fr;gap:14px;}
  .frame{position:relative;border-radius:14px;overflow:hidden;border:1px solid #e5e7eb;box-shadow:var(--shadow-card);}
  .frame img{display:block;width:100%;height:100%;object-fit:cover;}
  .frame .lbl{position:absolute;left:10px;bottom:10px;font-size:10px;font-weight:700;color:#1f2937;background:rgba(255,255,255,0.85);padding:5px 10px;border-radius:8px;backdrop-filter:blur(6px);letter-spacing:0.04em;}
  .stack{display:flex;flex-direction:column;gap:14px;}
  .stack .frame{aspect-ratio:1.6/1;}
</style></head>
<body>
  <div class="wrap">
    <div class="frame" style="aspect-ratio:1.85/1;"><img src="../assets/portada-fachada.png" alt="Storefront"><span class="lbl">Marketing — storefront render</span></div>
    <div class="stack">
      <div class="frame"><img src="../assets/logo-isotipo-navy.png" alt="Boxed logo"><span class="lbl">Boxed isologotipo</span></div>
      <div class="frame"><img src="../assets/logo-completo.jpeg" alt="Brand sheet"><span class="lbl">Brand sheet (reference)</span></div>
    </div>
  </div>
</body></html>
