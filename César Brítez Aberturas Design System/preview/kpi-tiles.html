<!DOCTYPE html><html lang="es"><head><meta charset="utf-8"><title>KPI Tiles</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--app-bg);font-family:var(--font-sans);}
  .wrap{padding:22px;display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  .tile{background:#fff;border:1px solid #f3f4f6;border-radius:14px;box-shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);padding:14px;display:flex;flex-direction:column;gap:8px;}
  .top{display:flex;align-items:flex-start;justify-content:space-between;}
  .lbl{font-size:11px;font-weight:500;color:#6b7280;line-height:1.3;}
  .icbox{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .icbox svg{width:16px;height:16px;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;}
  .val{font-size:22px;font-weight:800;color:#111827;font-variant-numeric:tabular-nums;line-height:1;letter-spacing:-0.01em;}
  .sub{font-size:11px;color:#9ca3af;}
  .bar{height:6px;background:#f3f4f6;border-radius:9999px;overflow:hidden;}
  .fill{height:100%;border-radius:9999px;}
  .pct{font-size:10px;font-weight:800;font-variant-numeric:tabular-nums;}
  .br{display:flex;align-items:center;gap:8px;}
  .br .bar{flex:1;}
</style></head>
<body>
  <div class="wrap">
    <div class="tile">
      <div class="top">
        <div class="lbl">Ventas del mes</div>
        <div class="icbox" style="background:#dbeafe;color:#1d4ed8"><svg viewBox="0 0 24 24" stroke="currentColor"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div>
      </div>
      <div class="val">$ 8.450.000</div>
      <div class="br"><div class="bar"><div class="fill" style="background:#10b981;width:62%"></div></div><span class="pct" style="color:#047857">62%</span></div>
      <div class="sub">Día 18 de 30 — 24 ops.</div>
    </div>
    <div class="tile">
      <div class="top">
        <div class="lbl">Presupuestos activos</div>
        <div class="icbox" style="background:#ede9fe;color:#6d28d9"><svg viewBox="0 0 24 24" stroke="currentColor"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M9 13h6M9 17h6"/></svg></div>
      </div>
      <div class="val">17</div>
      <div class="br"><div class="bar"><div class="fill" style="background:#a78bfa;width:34%"></div></div><span class="pct" style="color:#6d28d9">34%</span></div>
      <div class="sub">Activos este mes</div>
    </div>
    <div class="tile">
      <div class="top">
        <div class="lbl">% de cierre</div>
        <div class="icbox" style="background:#d1fae5;color:#047857"><svg viewBox="0 0 24 24" stroke="currentColor"><polyline points="3 17 9 11 13 15 21 7"/><polyline points="14 7 21 7 21 14"/></svg></div>
      </div>
      <div class="val">38%</div>
      <div class="br"><div class="bar"><div class="fill" style="background:#34d399;width:38%"></div></div><span class="pct" style="color:#047857">38%</span></div>
      <div class="sub">9 cerrados de 24</div>
    </div>
    <div class="tile">
      <div class="top">
        <div class="lbl">Pedidos atrasados</div>
        <div class="icbox" style="background:#fee2e2;color:#b91c1c"><svg viewBox="0 0 24 24" stroke="currentColor"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
      </div>
      <div class="val">3</div>
      <div class="br"><div class="bar"><div class="fill" style="background:#ef4444;width:15%"></div></div><span class="pct" style="color:#b91c1c">15%</span></div>
      <div class="sub">Superan fecha estimada</div>
    </div>
  </div>
</body></html>
