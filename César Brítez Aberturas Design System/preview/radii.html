<!DOCTYPE html><html lang="es"><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--app-bg);font-family:var(--font-sans);}
  .wrap{padding:24px;display:grid;grid-template-columns:repeat(5,1fr);gap:18px;align-items:end;}
  .tile{display:flex;flex-direction:column;align-items:center;gap:10px;}
  .box{width:80px;height:80px;background:#fff;border:1px solid #e5e7eb;box-shadow:var(--shadow-card);}
  .name{font-size:11px;font-weight:600;color:#1f2937;}
  .val{font-size:10px;color:#9ca3af;font-family:var(--font-mono);}
  .use{font-size:10px;color:#6b7280;text-align:center;line-height:1.3;}
</style></head>
<body>
  <div class="wrap">
    <div class="tile"><div class="box" style="border-radius:6px"></div><div class="name">sm · 6px</div><div class="val">rounded-md</div><div class="use">dots, chips</div></div>
    <div class="tile"><div class="box" style="border-radius:8px"></div><div class="name">md · 8px</div><div class="val">rounded-lg</div><div class="use">icon tiles, inputs</div></div>
    <div class="tile"><div class="box" style="border-radius:12px"></div><div class="name">lg · 12px</div><div class="val">rounded-xl</div><div class="use">buttons, rows</div></div>
    <div class="tile"><div class="box" style="border-radius:16px"></div><div class="name">xl · 16px</div><div class="val">rounded-2xl</div><div class="use">cards (default)</div></div>
    <div class="tile"><div class="box" style="border-radius:9999px"></div><div class="name">pill</div><div class="val">rounded-full</div><div class="use">badges, avatars</div></div>
  </div>
</body></html>
