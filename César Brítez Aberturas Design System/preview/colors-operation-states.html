<!-- @dsCard group="Colors" -->
<!DOCTYPE html><html lang="es"><head><meta charset="utf-8"><title>Operation States</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--app-bg);font-family:var(--font-sans);}
  .wrap{padding:20px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px 14px;}
  .row{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--fg2);}
  .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .name{font-weight:600;}
  .hex{font-family:var(--font-mono);font-size:10px;color:var(--fg5);margin-left:auto;}
</style></head>
<body>
  <div class="wrap">
    <div class="row"><span class="dot" style="background:#9ca3af"></span><span class="name">Borrador</span><span class="hex">gray-400</span></div>
    <div class="row"><span class="dot" style="background:#fbbf24"></span><span class="name">Enviado</span><span class="hex">amber-400</span></div>
    <div class="row"><span class="dot" style="background:#10b981"></span><span class="name">Aprobado</span><span class="hex">emerald-500</span></div>
    <div class="row"><span class="dot" style="background:#3b82f6"></span><span class="name">En producción</span><span class="hex">blue-500</span></div>
    <div class="row"><span class="dot" style="background:#14b8a6"></span><span class="name">Listo</span><span class="hex">teal-500</span></div>
    <div class="row"><span class="dot" style="background:#8b5cf6"></span><span class="name">Instalado</span><span class="hex">violet-500</span></div>
    <div class="row"><span class="dot" style="background:#22c55e"></span><span class="name">Entregado</span><span class="hex">green-500</span></div>
    <div class="row"><span class="dot" style="background:#f87171"></span><span class="name">Cancelado</span><span class="hex">red-400</span></div>
  </div>
</body></html>
