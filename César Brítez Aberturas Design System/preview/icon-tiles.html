<!-- @dsCard group="Components" -->
<!DOCTYPE html><html lang="es"><head><meta charset="utf-8"><title>Icon Tile Pattern</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--app-bg);font-family:var(--font-sans);}
  .wrap{padding:22px;display:grid;grid-template-columns:repeat(6,1fr);gap:14px;}
  .col{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .ic{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;}
  .ic svg{width:18px;height:18px;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;}
  .lbl{font-size:10px;font-weight:600;color:#4b5563;text-align:center;line-height:1.2;}
  .meta{font-family:var(--font-mono);font-size:9px;color:#9ca3af;}
</style></head>
<body>
  <div class="wrap">
    <div class="col"><div class="ic" style="background:#dbeafe;color:#1d4ed8"><svg viewBox="0 0 24 24" stroke="currentColor"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg></div><div class="lbl">Dashboard</div><div class="meta">blue 100·600</div></div>
    <div class="col"><div class="ic" style="background:#ffe4e6;color:#be123c"><svg viewBox="0 0 24 24" stroke="currentColor"><circle cx="6" cy="6" r="3"/><circle cx="18" cy="18" r="3"/><path d="M6 9v6a6 6 0 0 0 6 6"/></svg></div><div class="lbl">CRM</div><div class="meta">rose 100·600</div></div>
    <div class="col"><div class="ic" style="background:#ede9fe;color:#6d28d9"><svg viewBox="0 0 24 24" stroke="currentColor"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg></div><div class="lbl">Presupuestos</div><div class="meta">violet 100·600</div></div>
    <div class="col"><div class="ic" style="background:#fef3c7;color:#b45309"><svg viewBox="0 0 24 24" stroke="currentColor"><path d="m15 12-8.5 8.5a2.12 2.12 0 0 1-3-3L12 9"/><path d="m17.5 7.5-1.5-1.5L19 3l3 3-3 3L17.5 7.5z"/></svg></div><div class="lbl">Operaciones</div><div class="meta">amber 100·600</div></div>
    <div class="col"><div class="ic" style="background:#ccfbf1;color:#0f766e"><svg viewBox="0 0 24 24" stroke="currentColor"><rect x="1" y="3" width="15" height="13" rx="1"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg></div><div class="lbl">Remitos</div><div class="meta">teal 100·600</div></div>
    <div class="col"><div class="ic" style="background:#d1fae5;color:#047857"><svg viewBox="0 0 24 24" stroke="currentColor"><path d="M2 17h2.5a2 2 0 0 0 1.4-.6L7 16h10l1.1 1.4a2 2 0 0 0 1.4.6H22"/><path d="M2 8v9M22 8v9M5 8h14"/></svg></div><div class="lbl">Recibos</div><div class="meta">emerald 100·600</div></div>
    <div class="col"><div class="ic" style="background:#cffafe;color:#0e7490"><svg viewBox="0 0 24 24" stroke="currentColor"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div><div class="lbl">Clientes</div><div class="meta">cyan 100·600</div></div>
    <div class="col"><div class="ic" style="background:#e0e7ff;color:#4338ca"><svg viewBox="0 0 24 24" stroke="currentColor"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></div><div class="lbl">Estado&nbsp;Cta</div><div class="meta">indigo 100·600</div></div>
    <div class="col"><div class="ic" style="background:#e0f2fe;color:#0369a1"><svg viewBox="0 0 24 24" stroke="currentColor"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg></div><div class="lbl">Productos</div><div class="meta">sky 100·600</div></div>
    <div class="col"><div class="ic" style="background:#ffedd5;color:#c2410c"><svg viewBox="0 0 24 24" stroke="currentColor"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg></div><div class="lbl">Stock</div><div class="meta">orange 100·600</div></div>
    <div class="col"><div class="ic" style="background:#f3e8ff;color:#7e22ce"><svg viewBox="0 0 24 24" stroke="currentColor"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg></div><div class="lbl">Reportes</div><div class="meta">purple 100·600</div></div>
    <div class="col"><div class="ic" style="background:#f1f5f9;color:#475569"><svg viewBox="0 0 24 24" stroke="currentColor"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg></div><div class="lbl">Config</div><div class="meta">slate 100·600</div></div>
  </div>
</body></html>
