<!DOCTYPE html><html lang="es"><head><meta charset="utf-8"><title>Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--font-sans);}
  .wrap{padding:20px 24px;}
  .header{display:flex;align-items:baseline;gap:10px;margin-bottom:14px;}
  .h-title{font-size:13px;font-weight:700;color:#1f2937;}
  .h-meta{font-size:11px;color:#9ca3af;font-family:var(--font-mono);}
  .grid{display:grid;grid-template-columns:repeat(10,1fr);gap:10px 6px;}
  .col{display:flex;flex-direction:column;align-items:center;gap:4px;}
  .col svg{width:22px;height:22px;stroke:#1f2937;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;}
  .col span{font-size:9px;color:#9ca3af;font-weight:500;text-align:center;line-height:1.1;}
</style></head>
<body>
  <div class="wrap">
    <div class="header">
      <div class="h-title">Lucide — stroke 2, no fills, default size 20–22 in cards</div>
      <div class="h-meta">lucide-react@^1.8</div>
    </div>

    </div>
  </div>
</body></html>
