# ── aberturas.cesarbritez.com.ar — CRM ───────────────────────
server {
    listen 80;
    server_name aberturas.cesarbritez.com.ar;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name aberturas.cesarbritez.com.ar;

    ssl_certificate     /etc/letsencrypt/live/aberturas.cesarbritez.com.ar/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aberturas.cesarbritez.com.ar/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Logs
    access_log /var/log/nginx/aberturas.access.log;
    error_log  /var/log/nginx/aberturas.error.log;

    # Subir imágenes/archivos hasta 20MB
    client_max_body_size 20M;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket si hace falta en el futuro
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}
