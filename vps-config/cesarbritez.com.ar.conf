# ── cesarbritez.com.ar — Sitio web ───────────────────────────
server {
    listen 80;
    server_name cesarbritez.com.ar www.cesarbritez.com.ar;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name cesarbritez.com.ar www.cesarbritez.com.ar;

    ssl_certificate     /etc/letsencrypt/live/cesarbritez.com.ar/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cesarbritez.com.ar/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Logs
    access_log /var/log/nginx/cesarbritez.access.log;
    error_log  /var/log/nginx/cesarbritez.error.log;

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
